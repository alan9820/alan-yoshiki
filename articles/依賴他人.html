        <div class="share-section">
            <button id="webShareBtn" class="share-btn-single" onclick="shareArticle()">
                🔗 分享文章
            </button>
        </div>

        <script>
        async function shareArticle() {
            const shareData = {
                title: '依賴他人的代價',
                text: '依賴他人的代價',
                url: window.location.href
            };
            
            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        fallbackShare();
                    }
                }
            } else {
                fallbackShare();
            }
        }
        
        function fallbackShare() {
            // Fallback: show native share on mobile, or copy link on desktop
            if (/mobile|android|iphone|ipad/i.test(navigator.userAgent)) {
                window.location.href = 'https://api.whatsapp.com/send?text=' + encodeURIComponent(document.title + ' ' + window.location.href);
            } else {
                navigator.clipboard.writeText(window.location.href).then(function() {
                    alert('連結已複製！');
                }, function() {
                    alert('複製失敗，請手動複製');
                });
            }
        }
        </script>
