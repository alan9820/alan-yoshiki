        { q: "香港房屋政策嘅主要目標係？", opts: ["增加供應", "降低價格", "滿足需求", "全部都是"], a: 3 },

        { q: "香港最近舉辦嘅大型國際活動係？", opts: ["演唱會", "展覽", "金融峰會", "體育賽事"], a: 2 },
    ],
    '音樂': [
        { q: "張學友被稱為？", opts: ["歌神", "歌王", "歌聖", "歌俠"], a: 0 },
        { q: "香港著名嘅演唱會場地係？", opts: ["紅館", "大球場", "兩者都是", "兩者都不是"], a: 2 },
        { q: "邊個唔係香港天王級歌手？", opts: ["劉德華", "張學友", "郭富城", "林俊傑"], a: 3 },
        { q: "香港樂壇四大天王包括？", opts: ["張劉郭黎明", "張劉郭黃", "張劉郭鄭", "張劉郭陳"], a: 0 },
        { q: "《海闊天空》係邊個樂隊嘅作品？", opts: ["Beyond", "草蜢", "達明一派", "溫拿"], a: 0 },

    '電影': [

        { q: "邊個導演被稱為「香港電影之父」？", opts: ["徐克", "王家衛", "杜琪峯", "黎民偉"], a: 3 },
        { q: "《無間道》嘅主演演員包括？", opts: ["劉德華、梁朝偉", "周潤發、成龍", "張學友、郭富城", "黃秋生、吳鎮宇"], a: 0 },
        { q: "香港電影金像獎創辦於幾時？", opts: ["1980年", "1982年", "1984年", "1986年"], a: 1 },
        { q: "周星馳嘅代表作包括？", opts: ["功夫", "少林足球", "兩者都是", "兩者都不是"], a: 2 },
    ],
};

// Add more questions to make 15 per category
Object.keys(QUESTION_BANK).forEach(cat => {
    const base = QUESTION_BANK[cat];
    while (QUESTION_BANK[cat].length < 15) {
        const extra = base.map(q => ({
            q: q.q + "（變化版）",
            opts: [...q.opts],
            a: q.a
        }));
        QUESTION_BANK[cat].push(...extra.slice(0, 15 - QUESTION_BANK[cat].length));
    }
});

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function loadQuestions() {
    const bank = QUESTION_BANK[selectedCategory] || QUESTION_BANK['隨機'];
    questions = shuffle([...bank]).slice(0, 15);
}

function renderPyramid() {
    const pyramid = document.getElementById('pyramid');
    pyramid.innerHTML = '';
    for (let i = 14; i >= 0; i--) {
        const reached = i < currentLevel;
        const current = i === currentLevel;
        const safe = SAFE_LEVELS.includes(i);
        let cls = 'pyramid-item';
        if (reached) cls += ' reached';
        if (current) cls += ' current';
        if (safe && reached) cls += ' safe';
        const money = MONEY_LEVELS[i].toLocaleString();
        pyramid.innerHTML += `<div class="pyramid-row"><span class="pyramid-level">${i+1}</span><div class="${cls}">$${money}</div></div>`;
    }
}

function renderQuestion() {
    const q = questions[currentLevel];
    document.getElementById('questionNumber').textContent = `第 ${currentLevel + 1} 題`;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('currentMoney').textContent = '$' + MONEY_LEVELS[currentLevel].toLocaleString();
    document.getElementById('displayName').textContent = playerName;
    const answersDiv = document.getElementById('answers');
    answersDiv.innerHTML = '';
    q.opts.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.innerHTML = `<span class="answer-letter">${LETTERS[idx]}</span><span>${opt}</span>`;
        btn.onclick = () => selectAnswer(idx);
        answersDiv.appendChild(btn);
    });
    pendingAnswer = null;
    renderPyramid();
    updateLifelineButtons();
}

function updateLifelineButtons() {
    document.getElementById('fiftyBtn').disabled = !lifelines.fifty;
    document.getElementById('phoneBtn').disabled = !lifelines.phone;
    document.getElementById('audienceBtn').disabled = !lifelines.audience;
}

function selectAnswer(idx) {
    if (pendingAnswer !== null) return;
    const btns = document.querySelectorAll('.answer-btn');
    btns.forEach(b => b.classList.remove('selected'));
    btns[idx].classList.add('selected');
    pendingAnswer = idx;
    showConfirmModal();
}

function showConfirmModal() {
    const q = questions[currentLevel];
    document.getElementById('confirmQuestion').textContent = q.q;
    document.getElementById('confirmAnswer').textContent = `${LETTERS[pendingAnswer]}: ${q.opts[pendingAnswer]}`;
    document.getElementById('confirmModal').classList.add('active');
}

function confirmAnswer() {
    document.getElementById('confirmModal').classList.remove('active');
    checkAnswer(pendingAnswer);
}

function cancelAnswer() {
    document.getElementById('confirmModal').classList.remove('active');
    const btns = document.querySelectorAll('.answer-btn');
    btns.forEach(b => b.classList.remove('selected'));
    pendingAnswer = null;
}

function checkAnswer(idx) {
    const q = questions[currentLevel];
    const btns = document.querySelectorAll('.answer-btn');
    
    if (idx === q.a) {
        btns[idx].classList.add('correct');
        currentLevel++;
        if (currentLevel >= 15) {
            showResult(true, MONEY_LEVELS[14]);
        } else {
            setTimeout(() => renderQuestion(), 1500);
        }
    } else {
        btns[idx].classList.add('wrong');
        btns[q.a].classList.add('correct');
        const safeMoney = SAFE_LEVELS.filter(l => l < currentLevel).pop() || 0;
        setTimeout(() => showResult(false, MONEY_LEVELS[safeMoney]), 2000);
    }
}

function useLifeline(type) {
    const q = questions[currentLevel];
    if (type === 'fifty' && lifelines.fifty) {
        lifelines.fifty = false;
        const wrong = q.opts.map((_, i) => i).filter(i => i !== q.a);
        shuffle(wrong);
        const toRemove = wrong.slice(0, 2);
        const btns = document.querySelectorAll('.answer-btn');
        toRemove.forEach(i => btns[i].classList.add('eliminated'));
        updateLifelineButtons();
    } else if (type === 'phone' && lifelines.phone) {
        lifelines.phone = false;
        document.getElementById('phoneQuestion').textContent = q.q;
        document.getElementById('phoneAnswer').textContent = `朋友建議：${LETTERS[q.a]}（${q.opts[q.a]}）`;
        document.getElementById('phoneModal').classList.add('active');
        updateLifelineButtons();
    } else if (type === 'audience' && lifelines.audience) {
        lifelines.audience = false;
        const bar = document.getElementById('audienceBar');
        bar.innerHTML = '';
        const percents = q.opts.map((_, i) => {
            if (i === q.a) return 50 + Math.random() * 40;
            return Math.random() * 20;
        });
        const total = percents.reduce((a, b) => a + b, 0);
        const heights = percents.map(p => (p / total * 120) + 20);
        const maxIdx = heights.indexOf(Math.max(...heights));
        q.opts.forEach((opt, i) => {
            const div = document.createElement('div');
            div.style.height = heights[i] + 'px';
            div.textContent = LETTERS[i];
            if (i === maxIdx) div.style.background = 'linear-gradient(180deg, #4caf50, #2e7d32)';
            bar.appendChild(div);
        });
        document.getElementById('audienceQuestion').textContent = q.q;
        document.getElementById('audienceAdvice').textContent = `觀眾建議：${LETTERS[maxIdx]}`;
        document.getElementById('audienceModal').classList.add('active');
        updateLifelineButtons();
    }
}

function closeModal(id) {
    document.getElementById(id).classList.remove('active');
}

let playerName = '玩家';

function startGame() { playBgm(); {
    playerName = document.getElementById('playerName').value || '玩家';
    const selected = document.querySelector('.cat-btn.selected');
    selectedCategory = selected ? selected.dataset.cat : '隨機';
    document.getElementById('startScreen').classList.remove('active');
    document.getElementById('gameScreen').classList.add('active');
    currentLevel = 0;
    lifelines = { fifty: true, phone: true, audience: true };
    loadQuestions();
    renderQuestion();
}

function showResult(won, money) {
    document.getElementById('gameScreen').classList.remove('active');
    document.getElementById('resultScreen').classList.add('active');
    const title = document.getElementById('resultTitle');
    const msg = document.getElementById('resultMessage');
    const prize = document.getElementById('resultPrize');
    if (won) {
        title.textContent = '🎉 恭喜！你成為百萬富翁！';
        title.className = 'result-title';
        msg.textContent = '你贏得了';
        prize.textContent = '$' + money.toLocaleString();
    } else {
        title.textContent = '😢 遊戲結束';
        title.className = 'result-title lose';
        msg.textContent = '你贏得了';
        prize.textContent = '$' + money.toLocaleString();
    }
    saveScore(money);
}

function goHome() { stopBgm(); {
    document.getElementById('resultScreen').classList.remove('active');
    document.getElementById('startScreen').classList.add('active');
    
// Audio
let bgmPlaying = false;
function playBgm() {
    const bgm = document.getElementById('bgm');
    if (bgm && !bgmPlaying) {
        bgm.volume = 0.3;
        bgm.play().catch(e => console.log('Audio play failed:', e));
        bgmPlaying = true;
    }
}
function stopBgm() {
    const bgm = document.getElementById('bgm');
    if (bgm) {
        bgm.pause();
        bgmPlaying = false;
    }
}

loadLeaderboard();
}

async function saveScore(score) {
    try {
        await fetch('https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec', {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ name: playerName, score: score })
        });
    } catch (e) { console.log('Score save skipped'); }
}

function loadLeaderboard() {
    document.getElementById('leaderboardList').innerHTML = '<li class="leaderboard-empty">暫無排名</li>';
}

// Category selection
document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    });
});

loadLeaderboard();
    </script>
